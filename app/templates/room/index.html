{% extends "base.html" %}
{% block title %}Rooms{% endblock %}
{% block content %}
<div class="row">
    <!-- Left panel for room selection -->
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">Available Rooms</h5>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush">
                    {% for r in rooms %}
                        <div class="list-group-item d-flex justify-content-between align-items-center">
                            {{ r }}
                            <button class="btn btn-sm btn-outline-success room-btn" 
                                    data-room="{{ r }}" 
                                    data-joined="0" 
                                    onclick="manageRoom(event, '{{ r }}')">
                                Join
                            </button>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <!-- Right panel for Chatting -->
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white d-flex justify-content-between">
                <h5 class="mb-0">Rooms Chat</h5>
                <span class="badge bg-danger d-none" id="conn-badge">Disconnected</span>
            </div>
            <div class="card-body bg-light">
                <div class="chat-container mb-3 d-flex flex-column" id="messages-container" style="height: 50vh;">
                    <ul class="list-unstyled" id="messages-list">
                        <!-- Messages via JS populate here -->
                        <li class="text-center text-muted mt-3">Join a room to start chatting...</li>
                    </ul>
                </div>
                
                <div class="input-group mb-2">
                    <span class="input-group-text">Send to:</span>
                    <select class="form-select" id="selectedRoom">
                        <option value="" disabled selected>Select a joined room</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <input type="text" class="form-control" id="message" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsj()">
                    <button class="btn btn-primary" onclick="sendMsj()">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let joinedRooms = [];
    const selectedRoomSelect = document.querySelector("#selectedRoom");
    const messagesList = document.querySelector("#messages-list");
    const msgsContainer = document.querySelector("#messages-container");
    
    // Connect specifically to the /chat namespace
    const socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port + '/chat');

    socket.on('connect', function() {
        document.getElementById('conn-badge').classList.add('d-none');
        addSystemMessage("Connected to server.", "success");
    });
    
    socket.on('disconnect', function() {
        document.getElementById('conn-badge').classList.remove('d-none');
        addSystemMessage("Disconnected from server.", "danger");
    });

    function manageRoom(event, room) {
        const btn = event.target;
        const isJoined = btn.getAttribute('data-joined') === '1';

        if (!isJoined) {
            btn.setAttribute('data-joined', '1');
            btn.classList.replace('btn-outline-success', 'btn-danger');
            btn.innerText = "Leave";
            join(room);
        } else {
            btn.setAttribute('data-joined', '0');
            btn.classList.replace('btn-danger', 'btn-outline-success');
            btn.innerText = "Join";
            leave(room);
        }
    }

    function join(room) {
        socket.emit('join', { room: room });
        if (!joinedRooms.includes(room)) {
            joinedRooms.push(room);
            populateSelectedRoom();
        }
    }

    function leave(room) {
        socket.emit('leave', { room: room });
        const index = joinedRooms.indexOf(room);
        if (index > -1) {
            joinedRooms.splice(index, 1);
            populateSelectedRoom();
        }
    }

    function populateSelectedRoom() {
        selectedRoomSelect.options.length = 0;
        
        if (joinedRooms.length === 0) {
            const opt = document.createElement('option');
            opt.disabled = true;
            opt.selected = true;
            opt.text = "Select a joined room";
            selectedRoomSelect.appendChild(opt);
            return;
        }

        joinedRooms.forEach(room => {
            const opt = document.createElement('option');
            opt.value = room;
            opt.text = room;
            selectedRoomSelect.appendChild(opt);
        });
    }

    function sendMsj() {
        const msgInput = document.getElementById("message");
        const msg = msgInput.value.trim();
        const room = selectedRoomSelect.value;
        
        if (msg === "") return;
        if (!room) {
            alert("You must select a room to send the message to.");
            return;
        }

        socket.emit('chat', { message: msg, room: room });
        msgInput.value = "";
    }

    function addSystemMessage(msg, type="info") {
        if(messagesList.querySelector('.text-muted.mt-3')) {
            messagesList.innerHTML = '';
        }
        
        const li = document.createElement('li');
        li.className = `text-center text-${type} small mb-2`;
        li.innerText = msg;
        messagesList.appendChild(li);
        msgsContainer.scrollTop = msgsContainer.scrollHeight;
    }

    function addChatMessage(msg, roomInfo = "") {
        if(messagesList.querySelector('.text-muted.mt-3')) {
            messagesList.innerHTML = '';
        }
        
        const li = document.createElement('li');
        li.className = "mb-2 pb-1 border-bottom border-light";
        li.innerHTML = `
            <div class="px-2 py-1 rounded bg-white shadow-sm d-inline-block">
                ${roomInfo ? `<span class="badge bg-secondary me-2">${roomInfo}</span>` : ''}
                ${msg}
            </div>
        `;
        messagesList.appendChild(li);
        msgsContainer.scrollTop = msgsContainer.scrollHeight;
    }

    // Socket events for chat and room coordination
    socket.on('chat', function (msg) {
        addChatMessage(msg);
    });
    
    socket.on('join', function (msg) {
        addSystemMessage(msg, "success");
    });
    
    socket.on('leave', function (msg) {
        addSystemMessage(msg, "warning");
    });

</script>
{% endblock %}
