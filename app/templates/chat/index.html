{% extends "base.html" %}
{% block title %}Global Chat{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Global Chat ({{ room }})</h4>
                <span class="badge bg-success" id="connection-status">Connecting...</span>
            </div>
            <div class="card-body bg-light">
                <div class="chat-container d-flex flex-column" id="messages-container">
                    <ul class="list-unstyled mb-0 w-100" id="messages">
                        {% for m in messages %}
                            <li class="mb-3 pb-2 border-bottom">
                                <div class="d-flex justify-content-between">
                                    <strong>{{ m.user.username }}</strong>
                                    <small class="text-muted">{{ m.created_at }}</small>
                                </div>
                                <div class="mt-1">{{ m.message }}</div>
                            </li>
                        {% endfor %}
                    </ul>
                </div>
                
                <div class="input-group mt-3">
                    <textarea class="form-control" id="message" rows="2" placeholder="Write your message here..." onkeypress="checkEnter(event)"></textarea>
                    <button class="btn btn-primary px-4" onclick="sendMsj()">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const socket = io();
    const messagesContainer = document.getElementById("messages-container");
    const connectionStatus = document.getElementById("connection-status");

    // Scroll to bottom initially
    messagesContainer.scrollTop = messagesContainer.scrollHeight;

    function checkEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsj();
        }
    }

    function sendMsj() {
        const messageInput = document.querySelector("#message");
        const msg = messageInput.value.trim();
        
        if (msg === "") {
            return;
        }

        socket.emit('chat', { message: msg, room: "{{ room }}" });
        messageInput.value = "";
        messageInput.focus();
    }

    socket.on('connect', function () {
        connectionStatus.textContent = "Connected";
        connectionStatus.className = "badge bg-success";
    });
    
    socket.on('disconnect', function () {
        connectionStatus.textContent = "Disconnected";
        connectionStatus.className = "badge bg-danger";
    });

    socket.on('chat', function (msg_data) {
        const messages = document.getElementById("messages");
        const li = document.createElement("li");
        li.className = "mb-3 pb-2 border-bottom shadow-sm bg-white p-2 rounded";
        
        li.innerHTML = `
            <div class="d-flex justify-content-between">
                <strong class="text-primary">${msg_data.username}</strong>
                <small class="text-muted">${msg_data.created_at}</small>
            </div>
            <div class="mt-1">${msg_data.message}</div>
        `;

        messages.appendChild(li);
        
        // Auto scroll to latest
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });
</script>
{% endblock %}
